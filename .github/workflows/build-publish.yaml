name: Build and publish pypi package

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'

jobs:
  build_publish:
    name: Build and publish package
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
    environment:
      name: pypi
      url: https://pypi.org/p/parse-changelog

    steps:

    - name: Check out the repo 📘
      uses: actions/checkout@v3

    - name: Set up Python 3.11 🐍
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"

    - name: Install tools 🛠️
      run: |-
        sudo apt-get install --yes make
        python -m pip install setuptools twine wheel bump2version

    - name: Get the next version 📈
      run: |-
        git fetch --tags --force --prune --prune-tags
        current_version=$(git tag --list 'v*' | tr -d 'v' | sort -Vur | head -n1)
        bump2version_output=$(bump2version --dry-run --list --current-version "${current_version}" patch)
        new_version=$(printf '%s\n' "${bump2version_output}" | awk -F= '$1 == "new_version" {print $2}')
        [[ "${new_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
        printf 'NEW_VERSION=%s\n' "${new_version}" >> "${GITHUB_ENV}"

    - name: Build package 📦
      run: >-
        make package TAG="${NEW_VERSION}"

    - name: Update CHANGELOG with release 📋
      if: startsWith(github.ref, 'refs/heads/main')
      run: |-
        bin/parse-changelog --release "${NEW_VERSION}"

    - name: Commit CHANGELOG and tag 💾
      if: startsWith(github.ref, 'refs/heads/main')
      run: |-
        if ! git diff -s --exit-code CHANGELOG.md; then
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add CHANGELOG.md
          git tag -a "v${NEW_VERSION}" -m "Version ${NEW_VERSION}"
          git commit -m "Update CHANGELOG for new release [ci skip]"
          git push origin HEAD:main --follow-tags
        fi

    - name: Publish package to PyPI 🎁
      if: startsWith(github.ref, 'refs/heads/main')
      uses: pypa/gh-action-pypi-publish@f8c70e705ffc13c3b4d1221169b84f12a75d6ca8
